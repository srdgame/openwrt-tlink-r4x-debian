{{ $suite := or .suite "trixie" }}
{{ $cmdline := or .cmdline "fw_devlink=permissive clk_ignore_unused" }}
{{ $image := or .image "openwrt.img" }}
{{ $passwd := or .passwd "admin@1234" }}

architecture: arm64

actions:
  - action: mmdebstrap
    description: Bootstrap Debian {{ $suite }}
    suite: {{ $suite }}
    components:
      - main
      - non-free-firmware
    mirror: https://deb.debian.org/debian
    variant: minbase

  - action: overlay
    description: Setup apt repositories
    source: overlays/debian-backports

  - action: apt
    description: Install systemd
    recommends: true
    packages:
      - systemd
      - systemd-sysv
      - systemd-timesyncd
      - udev

  - action: apt
    description: Install other tools
    update: false
    recommends: true
    packages:
      - hostapd
      - wireless-regdb
      - iw
      - vim
      - curl
      - openssh-server
      - iproute2
      - initramfs-tools
      - tinc
      - iptables
      - iputils-ping
      - unzip
      - net-tools

  - action: overlay
    description: Put in local openwrt kernel
    source: overlays/kernel
    destination: /kernel

  - action: overlay
    description: Put in local openwrt kernel modules
    source: overlays/modules

  - action: overlay
    description: Configure networking
    source: overlays/network

  - action: overlay
    description: Misc configuration
    source: overlays/config

  - action: run
    description: Enable network services
    chroot: true
    command: |
      systemctl enable systemd-timesyncd
      systemctl enable hostapd@wlan0
      systemctl enable hostapd@wlan1
      systemctl enable serial-getty@ttyS0.service
      systemctl mask systemd-networkd.service
      systemctl mask systemd-networkd.socket
      systemctl mask systemd-network-generator.service
      systemctl mask systemd-random-seed.service
      systemctl mask systemd-networkd-wait-online.service

  - action: apt
    description: Install cockpit
    recommends: true
    packages:
      - cockpit

  - action: image-partition
    imagename: {{ $image }}
    partitiontype: msdos
    imagesize: 2G
    mountpoints:
      - mountpoint: /
        partition: root
        options:
          - x-systemd.growfs
      - mountpoint: /kernel
        partition: kernel
        options: [ x-systemd.automount ]
    partitions:
      - name: kernel
        # partlabel: kernel
        parttype: 83
        fs: ext4
        start: 32MiB
        end: 62MiB
      - name: root
        # partlabel: root
        # root arm64
        parttype: 83
        fs: ext4
        start: 64MiB
        end: 100%

  - action: filesystem-deploy
    append-kernel-cmdline: "{{ $cmdline }}"

# This needs to run last as apt gets unhappy without machine-id
  - action: run
    description: Setup system for first boot
    chroot: true
    command: |
      echo 'root:{{ $passwd }}' | chpasswd
      useradd -s /bin/bash admin
      echo 'admin:admin' | chpasswd
      usermod -aG sudo admin
      echo ThingsLink > /etc/hostname
      echo uninitialized > /etc/machine-id
      rm -f /etc/ssh/ssh_host_*
      sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
      depmod 6.6.129

  - action: run
    description: Setup Network-Mananger default settings
    chroot: true
    command: |
# 删除所有连接
      nmcli con delete $( nmcli connection | awk 'NR>1 && !/lo/ {print$1}' )
# 添加桥接接口 br-lan
      nmcli con add type bridge ifname br-lan con-name br-lan
      nmcli con mod br-lan ipv4.addresses 192.168.0.238/24
      nmcli con mod br-lan ipv4.method manual
      nmcli con mod br-lan ipv6.method ignore
      nmcli con mod br-lan connection.autoconnect yes
# 添加桥接从接口
      sudo nmcli con add type ethernet ifname lan1 con-name br-lan1 master br-lan
      nmcli con add type tun ifname symbridge con-name br-symbridge mode tap
      nmcli con mod br-symbridge master br-lan slave-type bridge
      nmcli con mod br-symbridge connection.autoconnect yes
      nmcli con add type tun ifname symrouter con-name br-symrouter mode tap
      nmcli con mod br-symrouter connection.autoconnect yes

# dd uboot to img
  - action: run
    description: Install u-boot to {{ $image }}
    postprocess: true
    command: dd if=system/overlays/uboot/tlink-r4x-rk3568-u-boot-rockchip.bin of={{ $image }} seek=64 conv=notrunc

  - action: run
    description: Create block map for {{ $image }}
    chroot: false
    postprocess: true
    command: cd $ARTIFACTDIR; bmaptool create {{ $image }} > {{ $image }}.bmap

  - action: run
    description: Compress {{ $image }}
    postprocess: true
    command: cd $ARTIFACTDIR; zstd --rm -f {{ $image }}
